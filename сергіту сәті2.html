<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сергіту сәті</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            color: #ff4757;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .video-container {
            width: 80%;
            max-width: 800px;
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 қатынасы */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #57606f;
            font-weight: bold;
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #0984e3; color: rgb(240, 239, 239);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>


    <h1>🌟 Сергіту сәті! 🌟</h1>

    <div class="video-container">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/kHnJyUAuupE?autoplay=1" 
                title="Сергіту сәті" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <p class="footer">Кәне, бәріміз бірге қимылдайық! 💃🕺</p>

</body>
</html>
